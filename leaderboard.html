<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>排行榜 - CPA会计</title>
<style>
  :root {
    --bg:#f0f2f5; --card:#fff; --text:#1a1a2e; --sub:#6b7280;
    --primary:#4f46e5; --gold:#f59e0b; --silver:#94a3b8; --bronze:#d97706;
    --border:#e5e7eb; --radius:14px; --shadow:0 2px 8px rgba(0,0,0,0.06); --nav-h:64px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background:var(--bg); color:var(--text); min-height:100vh;
    padding-bottom:calc(var(--nav-h) + 24px);
    -webkit-tap-highlight-color:transparent;
  }
  .header {
    background:linear-gradient(135deg, #f59e0b, #ef4444);
    color:#fff; padding:20px; position:sticky; top:0; z-index:100;
  }
  .header h1 { font-size:20px; margin-bottom:4px; }
  .header p { font-size:13px; opacity:0.85; }

  .period-tabs {
    display:flex; gap:6px; margin:16px; padding:4px;
    background:var(--card); border-radius:var(--radius);
    box-shadow:var(--shadow);
  }
  .period-tab {
    flex:1; padding:10px; text-align:center;
    border:none; background:none; border-radius:10px;
    font-size:13px; font-weight:600; cursor:pointer;
    color:var(--sub); transition:all 0.2s;
  }
  .period-tab.active { background:var(--primary); color:#fff; }

  .container { max-width:700px; margin:0 auto; padding:0 16px; }

  .rank-card {
    background:var(--card); border-radius:var(--radius);
    padding:16px; margin-bottom:10px; box-shadow:var(--shadow);
    display:flex; align-items:center; gap:14px;
    transition:transform 0.2s;
  }
  .rank-card.top { border:2px solid var(--gold); }
  .rank-num {
    width:38px; height:38px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-size:16px; font-weight:800; flex-shrink:0;
    background:#f3f4f6; color:var(--sub);
  }
  .rank-num.gold { background:#fef3c7; color:#92400e; }
  .rank-num.silver { background:#f1f5f9; color:#475569; }
  .rank-num.bronze { background:#fef3c7; color:#92400e; }
  .rank-info { flex:1; min-width:0; }
  .rank-name { font-size:15px; font-weight:700; display:flex; align-items:center; gap:6px; }
  .rank-medal { font-size:18px; }
  .rank-detail { font-size:12px; color:var(--sub); margin-top:2px; }
  .rank-stats { text-align:right; flex-shrink:0; }
  .rank-stat-main { font-size:20px; font-weight:800; }
  .rank-stat-label { font-size:11px; color:var(--sub); }

  .my-card {
    background:var(--primary); color:#fff; border-radius:var(--radius);
    padding:16px; margin:20px 0; box-shadow:0 4px 16px rgba(79,70,229,0.3);
    display:flex; align-items:center; gap:14px;
  }
  .my-card .rank-num { background:rgba(255,255,255,0.2); color:#fff; }
  .my-card .rank-detail { color:rgba(255,255,255,0.7); }
  .my-label { font-size:11px; opacity:0.7; margin-bottom:2px; }

  .empty-state { text-align:center; padding:60px 20px; color:var(--sub); }
  .empty-state .icon { font-size:56px; margin-bottom:12px; }

  .nav-bar {
    position:fixed; bottom:0; left:0; right:0; height:var(--nav-h);
    background:var(--card); border-top:1px solid var(--border);
    display:flex; z-index:200;
    padding-bottom:env(safe-area-inset-bottom,0);
  }
  .nav-item {
    flex:1; display:flex; flex-direction:column; align-items:center;
    justify-content:center; color:var(--sub); text-decoration:none;
    font-size:11px; gap:3px;
  }
  .nav-item.active { color:var(--primary); }
  .nav-item .nav-icon { font-size:20px; }
  .spinner { text-align:center; padding:40px; color:var(--sub); }
</style>
</head>
<body>

<div class="header">
  <h1>🏆 学习排行榜</h1>
  <p>互相激励，共同进步</p>
</div>

<div class="period-tabs" id="periodTabs">
  <button class="period-tab active" onclick="switchPeriod('today')">今日</button>
  <button class="period-tab" onclick="switchPeriod('week')">本周</button>
  <button class="period-tab" onclick="switchPeriod('month')">本月</button>
  <button class="period-tab" onclick="switchPeriod('all')">累计</button>
</div>

<div class="container" id="content">
  <div class="spinner">加载中...</div>
</div>

<nav class="nav-bar">
  <a class="nav-item" href="/index.html"><span class="nav-icon">📖</span>首页</a>
  <a class="nav-item" href="/wrongbook.html"><span class="nav-icon">📝</span>错题本</a>
  <a class="nav-item" href="/report.html"><span class="nav-icon">📊</span>学习报告</a>
  <a class="nav-item active" href="/leaderboard.html"><span class="nav-icon">🏆</span>排行榜</a>
</nav>

<script src="supabase.js"></script>
<script>
var period = 'today';
var user = null;
var allUsers = {}; // {user_id: {display_name, email}}

async function init() {
  user = await requireAuth();
  if (!user) return;
  await loadData();
}

async function loadData() {
  var range = getDateRange();

  try {
    // Load all study sessions (RLS allows authenticated users to read all)
    var sessions = await dbGet('study_sessions', 'order=session_date.desc&limit=500');

    // Load all checkins
    var checkins = await dbGet('checkins', 'order=checkin_date.desc&limit=200');

    // Load all progress
    var progress = await dbGet('user_progress', 'select=*');

    // Build user display names from the data
    // Since we can't query auth.users directly from client, we use stored user data
    // Each user's display name is stored in localStorage when they log in
    // For the leaderboard, we use user_id as identifier

    // Aggregate by user_id
    var userStats = {};
    var uid = userId();

    // Process sessions
    sessions.forEach(function(s) {
      var d = (s.session_date || '').split('T')[0];
      if (!inRange(d, range)) return;

      if (!userStats[s.user_id]) {
        userStats[s.user_id] = { studySec: 0, chapters: {}, checkins: 0 };
      }
      userStats[s.user_id].studySec += s.duration_seconds || 0;
      if (s.chapter_id) {
        userStats[s.user_id].chapters[s.chapter_id] = true;
      }
    });

    // Process checkins
    checkins.forEach(function(c) {
      var d = (c.checkin_date || '').split('T')[0];
      if (!inRange(d, range)) return;
      if (!userStats[c.user_id]) {
        userStats[c.user_id] = { studySec: 0, chapters: {}, checkins: 0 };
      }
      userStats[c.user_id].checkins++;
    });

    // Build leaderboard
    var entries = Object.keys(userStats).map(function(uidKey) {
      var s = userStats[uidKey];
      return {
        user_id: uidKey,
        studyMin: Math.round(s.studySec / 60),
        chaptersCount: Object.keys(s.chapters).length,
        checkins: s.checkins
      };
    });

    // Sort by study time desc
    entries.sort(function(a, b) { return b.studyMin - a.studyMin; });

    // Get display names - use a simple mapping
    // In a real app, we'd query a profiles table
    // For now, use user_id short form
    entries.forEach(function(e) {
      if (e.user_id === uid) {
        e.display_name = displayName() + ' (我)';
        e.isMe = true;
      } else {
        e.display_name = '学友 ' + e.user_id.substring(0, 6);
        e.isMe = false;
      }
    });

    renderLeaderboard(entries);

  } catch (e) {
    console.error('Leaderboard error:', e);
    document.getElementById('content').innerHTML = '<div class="empty-state"><div class="icon">⚠️</div><p>加载排行榜失败</p></div>';
  }
}

function getDateRange() {
  var now = new Date();
  var start = new Date();
  if (period === 'today') {
    return { start: now.toISOString().split('T')[0], end: now.toISOString().split('T')[0] };
  } else if (period === 'week') {
    start.setDate(now.getDate() - now.getDay());
    start.setHours(0,0,0,0);
  } else if (period === 'month') {
    start.setDate(1);
    start.setHours(0,0,0,0);
  } else {
    return null; // all
  }
  return { start: start.toISOString().split('T')[0], end: now.toISOString().split('T')[0] };
}

function inRange(dateStr, range) {
  if (!range) return true;
  return dateStr >= range.start && dateStr <= range.end;
}

function renderLeaderboard(entries) {
  var html = '';

  if (entries.length === 0) {
    html += '<div class="empty-state"><div class="icon">🕐</div><p>还没有学习数据</p><p style="font-size:13px;color:var(--sub)">快去学习吧！</p></div>';
    document.getElementById('content').innerHTML = html;
    return;
  }

  // Show "my rank" card
  var myEntry = entries.find(function(e) { return e.isMe; });
  var myRank = entries.indexOf(myEntry) + 1;

  if (myEntry) {
    html += '<div class="my-card">';
    html += '<div class="rank-num">' + myRank + '</div>';
    html += '<div class="rank-info">';
    html += '<div class="my-label">我的排名</div>';
    html += '<div class="rank-name">' + myEntry.display_name + '</div>';
    html += '<div class="rank-detail">' + myEntry.chaptersCount + ' 个章节 · ' + myEntry.checkins + ' 次打卡</div>';
    html += '</div>';
    html += '<div class="rank-stats"><div class="rank-stat-main">' + formatMin(myEntry.studyMin) + '</div><div class="rank-stat-label">分钟</div></div>';
    html += '</div>';
  }

  // Rank list
  entries.forEach(function(e, idx) {
    var medal = '';
    var numCls = '';
    if (idx === 0) { medal = '🥇'; numCls = 'gold'; }
    else if (idx === 1) { medal = '🥈'; numCls = 'silver'; }
    else if (idx === 2) { medal = '🥉'; numCls = 'bronze'; }

    html += '<div class="rank-card' + (idx < 3 ? ' top' : '') + '">';
    html += '<div class="rank-num ' + numCls + '">' + (idx + 1) + '</div>';
    html += '<div class="rank-info">';
    html += '<div class="rank-name"><span class="rank-medal">' + medal + '</span> ' + e.display_name + '</div>';
    html += '<div class="rank-detail">' + e.chaptersCount + ' 个章节 · ' + e.checkins + ' 次打卡</div>';
    html += '</div>';
    html += '<div class="rank-stats"><div class="rank-stat-main">' + formatMin(e.studyMin) + '</div><div class="rank-stat-label">分钟</div></div>';
    html += '</div>';
  });

  // Privacy note
  html += '<p style="text-align:center;font-size:11px;color:var(--sub);margin:20px 0">仅展示学习时长和进度，笔记内容不可见 🔒</p>';

  document.getElementById('content').innerHTML = html;
}

function switchPeriod(p) {
  period = p;
  document.querySelectorAll('.period-tab').forEach(function(t) { t.classList.remove('active'); });
  document.querySelectorAll('.period-tab').forEach(function(t) {
    if (t.textContent.trim().match(new RegExp(p === 'today' ? '今日' : p === 'week' ? '本周' : p === 'month' ? '本月' : '累计'))) {
      t.classList.add('active');
    }
  });
  document.getElementById('content').innerHTML = '<div class="spinner">加载中...</div>';
  loadData();
}

function formatMin(min) {
  if (min < 60) return min + '';
  return (min / 60).toFixed(1);
}

init();
</script>
</body>
</html>
