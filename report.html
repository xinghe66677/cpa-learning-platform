<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>学习报告 - CPA会计</title>
<style>
  :root {
    --bg:#f0f2f5; --card:#fff; --text:#1a1a2e; --sub:#6b7280;
    --primary:#4f46e5; --green:#10b981; --blue:#3b82f6;
    --orange:#f59e0b; --border:#e5e7eb; --radius:14px;
    --shadow:0 2px 8px rgba(0,0,0,0.06); --nav-h:64px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background:var(--bg); color:var(--text); min-height:100vh;
    padding-bottom:calc(var(--nav-h) + 24px);
    -webkit-tap-highlight-color:transparent;
  }
  .header {
    background:linear-gradient(135deg, #4f46e5, #7c3aed);
    color:#fff; padding:20px; position:sticky; top:0; z-index:100;
  }
  .header h1 { font-size:20px; margin-bottom:4px; }
  .header p { font-size:13px; opacity:0.75; }
  .container { max-width:700px; margin:0 auto; padding:16px; }

  /* Period tabs */
  .period-tabs {
    display:flex; gap:6px; margin-bottom:16px;
    background:var(--card); border-radius:var(--radius);
    padding:4px; box-shadow:var(--shadow);
  }
  .period-tab {
    flex:1; padding:10px; text-align:center;
    border:none; background:none; border-radius:10px;
    font-size:13px; font-weight:600; cursor:pointer;
    color:var(--sub); transition:all 0.2s;
  }
  .period-tab.active { background:var(--primary); color:#fff; }

  /* Stats Grid */
  .stats-grid {
    display:grid; grid-template-columns:1fr 1fr;
    gap:12px; margin-bottom:20px;
  }
  .stat-card {
    background:var(--card); border-radius:var(--radius);
    padding:16px; box-shadow:var(--shadow); text-align:center;
  }
  .stat-card .stat-icon { font-size:28px; margin-bottom:6px; }
  .stat-card .stat-val {
    font-size:28px; font-weight:800; margin-bottom:2px;
  }
  .stat-card .stat-label { font-size:12px; color:var(--sub); }

  /* Chapter Progress */
  .section-title {
    font-size:15px; font-weight:700; margin-bottom:12px;
    display:flex; align-items:center; gap:8px;
  }
  .ch-progress-item {
    background:var(--card); border-radius:var(--radius);
    padding:12px 16px; margin-bottom:8px; box-shadow:var(--shadow);
    display:flex; align-items:center; gap:12px;
  }
  .ch-progress-item .ch-num {
    width:30px; height:30px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-size:12px; font-weight:700; flex-shrink:0;
  }
  .ch-progress-item .ch-info { flex:1; min-width:0; }
  .ch-progress-item .ch-name { font-size:14px; font-weight:600; }
  .ch-progress-item .ch-time { font-size:12px; color:var(--sub); }
  .ch-progress-item .ch-bar {
    height:5px; background:var(--border); border-radius:3px;
    margin-top:6px; overflow:hidden;
  }
  .ch-progress-item .ch-bar-fill {
    height:100%; border-radius:3px; transition:width 0.4s;
  }

  /* Export Button */
  .export-bar {
    text-align:center; margin:24px 0;
  }
  .btn-export {
    padding:14px 32px; background:var(--primary); color:#fff;
    border:none; border-radius:12px; font-size:15px; font-weight:600;
    cursor:pointer; box-shadow:0 4px 12px rgba(79,70,229,0.3);
  }
  .btn-export:active { transform:scale(0.97); }

  .nav-bar {
    position:fixed; bottom:0; left:0; right:0; height:var(--nav-h);
    background:var(--card); border-top:1px solid var(--border);
    display:flex; z-index:200;
    padding-bottom:env(safe-area-inset-bottom,0);
  }
  .nav-item {
    flex:1; display:flex; flex-direction:column; align-items:center;
    justify-content:center; color:var(--sub); text-decoration:none;
    font-size:11px; gap:3px;
  }
  .nav-item.active { color:var(--primary); }
  .nav-item .nav-icon { font-size:20px; }
  .spinner { text-align:center; padding:40px; color:var(--sub); }
</style>
</head>
<body>

<div class="header">
  <h1>📊 学习报告</h1>
  <p id="reportSub">加载中...</p>
</div>

<div class="container" id="content">
  <div class="spinner">加载中...</div>
</div>

<nav class="nav-bar">
  <a class="nav-item" href="/index.html"><span class="nav-icon">📖</span>首页</a>
  <a class="nav-item" href="/wrongbook.html"><span class="nav-icon">📝</span>错题本</a>
  <a class="nav-item active" href="/report.html"><span class="nav-icon">📊</span>学习报告</a>
  <a class="nav-item" href="/leaderboard.html"><span class="nav-icon">🏆</span>排行榜</a>
</nav>

<script src="supabase.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>
var CHAPTERS = [];
var period = 'week'; // week, month, all
var allSessions = [];
var allProgress = [];
var allCheckins = [];
var allQuizzes = [];

async function init() {
  await requireAuth();
  try {
    var resp = await fetch('/data/chapters.json');
    var data = await resp.json();
    CHAPTERS = data.chapters;
  } catch(e) {}
  await loadData();
}

async function loadData() {
  var uid = userId();
  try {
    var results = await Promise.all([
      dbGet('study_sessions', 'user_id=eq.' + uid + '&order=session_date.desc&limit=200'),
      dbGet('user_progress', 'user_id=eq.' + uid),
      dbGet('checkins', 'user_id=eq.' + uid + '&order=checkin_date.desc&limit=60'),
      dbGet('quiz_attempts', 'user_id=eq.' + uid + '&order=created_at.desc&limit=50')
    ]);
    allSessions = results[0];
    allProgress = results[1];
    allCheckins = results[2];
    allQuizzes = results[3];
    renderAll();
  } catch (e) {
    document.getElementById('content').innerHTML = '<div class="empty-state" style="text-align:center;padding:60px"><p>加载失败，请刷新</p></div>';
  }
}

function getDateRange() {
  var now = new Date();
  var start = new Date();
  if (period === 'week') {
    start.setDate(now.getDate() - now.getDay());
    start.setHours(0,0,0,0);
  } else if (period === 'month') {
    start.setDate(1);
    start.setHours(0,0,0,0);
  } else {
    return null; // all time
  }
  return { start: start.toISOString().split('T')[0], end: now.toISOString().split('T')[0] };
}

function filterInPeriod(items, dateField) {
  var range = getDateRange();
  if (!range) return items;
  return items.filter(function(item) {
    var d = (item[dateField] || '').split('T')[0];
    return d >= range.start && d <= range.end;
  });
}

function renderAll() {
  var sessions = filterInPeriod(allSessions, 'session_date');
  var quizzes = filterInPeriod(allQuizzes, 'created_at');

  // Calculate stats
  var totalSec = sessions.reduce(function(s, x) { return s + (x.duration_seconds || 0); }, 0);
  var totalMin = Math.round(totalSec / 60);
  var totalHrs = (totalMin / 60).toFixed(1);
  var completedCh = allProgress.filter(function(p) { return p.status === 'completed'; }).length;
  var inProgress = allProgress.filter(function(p) { return p.status === 'in_progress'; }).length;
  var totalQ = quizzes.length;
  var avgScore = quizzes.length > 0 ? Math.round(quizzes.reduce(function(s,q) { return s + (q.score||0); }, 0) / quizzes.length) : 0;
  var streak = calcStreak();
  var checkinDays = filterInPeriod(allCheckins, 'checkin_date').length;

  document.getElementById('reportSub').textContent =
    period === 'week' ? '本周统计' : period === 'month' ? '本月统计' : '全部统计';

  var html = '';

  // Period tabs
  html += '<div class="period-tabs">';
  html += '<button class="period-tab' + (period==='week'?' active':'') + '" onclick="switchPeriod(\'week\')">本周</button>';
  html += '<button class="period-tab' + (period==='month'?' active':'') + '" onclick="switchPeriod(\'month\')">本月</button>';
  html += '<button class="period-tab' + (period==='all'?' active':'') + '" onclick="switchPeriod(\'all\')">全部</button>';
  html += '</div>';

  // Stats
  html += '<div class="stats-grid">';
  html += '<div class="stat-card"><div class="stat-icon">⏱️</div><div class="stat-val">' + totalHrs + '</div><div class="stat-label">学习总时长（小时）</div></div>';
  html += '<div class="stat-card"><div class="stat-icon">📚</div><div class="stat-val">' + completedCh + '/16</div><div class="stat-label">已完成章节</div></div>';
  html += '<div class="stat-card"><div class="stat-icon">📝</div><div class="stat-val">' + avgScore + '%</div><div class="stat-label">平均正确率</div></div>';
  html += '<div class="stat-card"><div class="stat-icon">🔥</div><div class="stat-val">' + streak + '</div><div class="stat-label">连续打卡天数</div></div>';
  html += '<div class="stat-card"><div class="stat-icon">✅</div><div class="stat-val">' + checkinDays + '</div><div class="stat-label">打卡天数</div></div>';
  html += '<div class="stat-card"><div class="stat-icon">✍️</div><div class="stat-val">' + totalQ + '</div><div class="stat-label">完成练习组数</div></div>';
  html += '</div>';

  // Chapter Progress
  html += '<div class="section-title">📖 章节进度（共16章）</div>';
  CHAPTERS.forEach(function(ch) {
    var prog = allProgress.find(function(p) { return p.chapter_id === ch.id; });
    var pct = 0;
    var time = '';
    var bg = '#f3f4f6';
    var fg = '#d1d5db';
    if (prog) {
      if (prog.status === 'completed') { pct = 100; bg = '#ecfdf5'; fg = '#10b981'; }
      else if (prog.status === 'in_progress') { pct = Math.min(95, Math.round((prog.time_spent_seconds||0) / 180)); bg = '#eff6ff'; fg = '#3b82f6'; }
      time = '学习 ' + Math.round((prog.time_spent_seconds || 0) / 60) + ' 分钟';
    }
    html += '<div class="ch-progress-item">';
    html += '<div class="ch-num" style="background:' + bg + ';color:' + fg + '">' + ch.id + '</div>';
    html += '<div class="ch-info">';
    html += '<div class="ch-name">' + ch.title + '</div>';
    html += '<div class="ch-time">' + (time || '未开始') + '</div>';
    html += '<div class="ch-bar"><div class="ch-bar-fill" style="width:' + pct + '%;background:' + fg + '"></div></div>';
    html += '</div>';
    html += '<div style="font-size:13px;font-weight:700;color:' + fg + '">' + pct + '%</div>';
    html += '</div>';
  });

  // Export button
  html += '<div class="export-bar"><button class="btn-export" onclick="exportPDF()">📥 导出PDF学习报告</button></div>';

  document.getElementById('content').innerHTML = html;
}

function switchPeriod(p) {
  period = p;
  renderAll();
}

function calcStreak() {
  if (allCheckins.length === 0) return 0;
  var dates = allCheckins.map(function(c) { return c.checkin_date; }).sort().reverse();
  var unique = []; dates.forEach(function(d) { if (unique.indexOf(d) === -1) unique.push(d); });
  var today = new Date().toISOString().split('T')[0];
  var yesterday = new Date(Date.now() - 86400000).toISOString().split('T')[0];
  if (unique.indexOf(today) === -1 && unique.indexOf(yesterday) === -1) return 0;

  var checkDate = new Date(unique.indexOf(today) !== -1 ? today : yesterday);
  var streak = 0;
  while (true) {
    var ds = checkDate.toISOString().split('T')[0];
    if (unique.indexOf(ds) !== -1) { streak++; checkDate.setDate(checkDate.getDate() - 1); }
    else break;
  }
  return streak;
}

function exportPDF() {
  // Use jsPDF for basic PDF generation
  var { jsPDF } = window.jspdf;
  var doc = new jsPDF();

  doc.setFontSize(18);
  doc.text('CPA会计学习报告', 14, 22);
  doc.setFontSize(11);
  doc.text('生成时间：' + new Date().toLocaleDateString('zh-CN'), 14, 32);
  doc.text('用户：' + displayName(), 14, 40);

  // Stats
  var y = 52;
  var sessions = filterInPeriod(allSessions, 'session_date');
  var totalMin = Math.round(sessions.reduce(function(s, x) { return s + (x.duration_seconds || 0); }, 0) / 60);
  var completedCh = allProgress.filter(function(p) { return p.status === 'completed'; }).length;
  var quizzes = filterInPeriod(allQuizzes, 'created_at');
  var avgScore = quizzes.length > 0 ? Math.round(quizzes.reduce(function(s,q) { return s + (q.score||0); }, 0) / quizzes.length) : 0;

  doc.setFontSize(12);
  doc.text('总学习时长：' + (totalMin/60).toFixed(1) + ' 小时', 14, y);
  y += 8;
  doc.text('已完成章节：' + completedCh + ' / 16', 14, y);
  y += 8;
  doc.text('平均正确率：' + avgScore + '%', 14, y);
  y += 8;
  doc.text('连续打卡：' + calcStreak() + ' 天', 14, y);
  y += 14;

  // Chapter breakdown
  doc.setFontSize(13);
  doc.text('章节进度明细：', 14, y);
  y += 8;
  doc.setFontSize(10);

  CHAPTERS.forEach(function(ch) {
    if (y > 270) { doc.addPage(); y = 20; }
    var prog = allProgress.find(function(p) { return p.chapter_id === ch.id; });
    var pct = 0;
    if (prog && prog.status === 'completed') pct = 100;
    else if (prog && prog.status === 'in_progress') pct = Math.min(95, Math.round((prog.time_spent_seconds||0) / 180));
    var icon = pct === 100 ? '✓' : pct > 0 ? '○' : '✗';
    doc.text(icon + ' 第' + ch.id + '章 ' + ch.title + ' — ' + pct + '%', 14, y);
    y += 7;
  });

  doc.save('CPA学习报告_' + new Date().toISOString().split('T')[0] + '.pdf');
}

init();
</script>
</body>
</html>
