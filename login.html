<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>选择账号 - CPA会计</title>
<style>
  :root {
    --bg: #f0f2f5; --card: #fff; --text: #1a1a2e; --sub: #6b7280;
    --primary: #4f46e5; --border: #e5e7eb; --radius: 16px;
    --shadow: 0 4px 24px rgba(0,0,0,0.06);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
    -webkit-tap-highlight-color: transparent;
  }
  .container { width: 100%; max-width: 440px; }
  .logo {
    text-align: center; color: #fff; margin-bottom: 28px;
  }
  .logo-icon { font-size: 52px; display: block; margin-bottom: 8px; }
  .logo h1 { font-size: 24px; font-weight: 700; }
  .logo p { font-size: 14px; opacity: 0.85; margin-top: 4px; }

  .card {
    background: var(--card); border-radius: var(--radius);
    box-shadow: var(--shadow); padding: 28px 24px;
  }
  .card-title {
    font-size: 17px; font-weight: 700; text-align: center;
    color: var(--text); margin-bottom: 6px;
  }
  .card-sub {
    font-size: 13px; color: var(--sub); text-align: center; margin-bottom: 24px;
  }

  .slot-list { display: flex; flex-direction: column; gap: 10px; }
  .slot-item {
    display: flex; align-items: center; gap: 14px;
    padding: 16px; border-radius: 12px;
    border: 2px solid var(--border); background: #fafbfc;
    cursor: pointer; transition: all 0.15s;
  }
  .slot-item:hover { border-color: #c7d2fe; background: #f5f3ff; }
  .slot-item:active { transform: scale(0.98); }
  .slot-item.selected { border-color: var(--primary); background: #eef2ff; }

  .slot-avatar {
    width: 44px; height: 44px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; font-weight: 700; flex-shrink: 0;
  }
  .slot-info { flex: 1; min-width: 0; }
  .slot-name {
    font-size: 16px; font-weight: 600; color: var(--text);
  }
  .slot-hint { font-size: 12px; color: var(--sub); margin-top: 2px; }
  .slot-edit {
    font-size: 12px; color: var(--primary); background: none; border: none;
    cursor: pointer; padding: 6px 10px; border-radius: 6px;
    font-weight: 600; flex-shrink: 0;
  }
  .slot-edit:hover { background: #eef2ff; }

  .avatar-colors {
    background: linear-gradient(135deg, #4f46e5, #7c3aed);
  }
  .avatar-colors:nth-child(2) { background: linear-gradient(135deg, #10b981, #059669); }
  .avatar-colors:nth-child(3) { background: linear-gradient(135deg, #f59e0b, #d97706); }
  .avatar-colors:nth-child(4) { background: linear-gradient(135deg, #ef4444, #dc2626); }
  .avatar-colors:nth-child(5) { background: linear-gradient(135deg, #8b5cf6, #6d28d9); }

  .btn-go {
    width: 100%; padding: 14px; margin-top: 20px;
    background: var(--primary); color: #fff;
    border: none; border-radius: 12px;
    font-size: 16px; font-weight: 600;
    cursor: pointer; transition: all 0.15s;
  }
  .btn-go:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-go:active:not(:disabled) { transform: scale(0.97); }

  /* Rename modal */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.4); z-index: 500;
    align-items: center; justify-content: center;
  }
  .modal-overlay.show { display: flex; }
  .modal-box {
    background: #fff; border-radius: var(--radius);
    padding: 28px 24px; width: 90%; max-width: 340px;
    text-align: center; animation: popIn 0.2s ease;
  }
  @keyframes popIn { from { transform:scale(0.9); opacity:0; } to { transform:scale(1); opacity:1; } }
  .modal-box h3 { font-size: 18px; margin-bottom: 16px; }
  .modal-box input {
    width: 100%; padding: 12px; font-size: 16px;
    border: 2px solid var(--border); border-radius: 10px;
    text-align: center; outline: none; margin-bottom: 16px;
  }
  .modal-box input:focus { border-color: var(--primary); }
  .modal-btns { display: flex; gap: 10px; }
  .modal-btns button {
    flex: 1; padding: 10px; border-radius: 8px;
    font-size: 14px; font-weight: 600; cursor: pointer; border: none;
  }
  .btn-save { background: var(--primary); color: #fff; }
  .btn-cancel { background: #f3f4f6; color: var(--sub); }

  .footer-text {
    text-align: center; color: rgba(255,255,255,0.6);
    font-size: 12px; margin-top: 20px;
  }
</style>
</head>
<body>
<div class="container">
  <div class="logo">
    <span class="logo-icon">📚</span>
    <h1>CPA会计学习平台</h1>
    <p>高志谦 · 会计讲义</p>
  </div>

  <div class="card">
    <div class="card-title">👋 选择你的学习账号</div>
    <div class="card-sub">每个人的学习进度独立保存</div>

    <div class="slot-list" id="slotList"></div>

    <button class="btn-go" id="btnGo" disabled onclick="goLearn()">进入学习 →</button>
  </div>

  <p class="footer-text">仅限内部学习使用 · 最多5人</p>
</div>

<!-- Rename Modal -->
<div class="modal-overlay" id="renameModal">
  <div class="modal-box">
    <h3>✏️ 修改名称</h3>
    <input type="text" id="renameInput" placeholder="输入你的名字" maxlength="10">
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeRename()">取消</button>
      <button class="btn-save" onclick="saveRename()">保存</button>
    </div>
  </div>
</div>

<script src="supabase.js"></script>
<script>
var profiles = [];
var selectedSlot = null;
var editingSlot = null;

// Avatar emojis per slot
var AVATARS = ['🦊', '🐱', '🐼', '🐨', '🦉'];

async function init() {
  // Check if already selected
  var existing = getSlot();
  if (existing && existing.slot_id) {
    // Already logged in — verify slot still exists
    try {
      var resp = await fetch(SB_URL + '/rest/v1/profiles?slot_id=eq.' + existing.slot_id, { headers: apiHeaders() });
      var data = await resp.json();
      if (data.length > 0) {
        // Valid — go straight to index
        setSlot(existing.slot_id, data[0].display_name);
        window.location.href = '/index.html';
        return;
      }
    } catch(e) {}
  }

  // Load profiles
  await loadProfiles();
}

async function loadProfiles() {
  try {
    profiles = await getProfiles();
    renderSlots();
  } catch(e) {
    console.error('Load profiles error:', e);
    // Fallback: hardcoded slots
    profiles = [
      {slot_id:1, display_name:'学友1'}, {slot_id:2, display_name:'学友2'},
      {slot_id:3, display_name:'学友3'}, {slot_id:4, display_name:'学友4'},
      {slot_id:5, display_name:'学友5'}
    ];
    renderSlots();
  }
}

function renderSlots() {
  var html = '';
  profiles.forEach(function(p) {
    var isSelected = selectedSlot === p.slot_id;
    var isDefault = p.display_name.indexOf('学友') === 0;
    var cls = 'slot-item' + (isSelected ? ' selected' : '');
    var hint = isDefault ? '点击选择并设置名字' : '点击选择此账号';

    html += '<div class="' + cls + '" onclick="selectSlot(' + p.slot_id + ')" id="slot' + p.slot_id + '">';
    html += '<div class="slot-avatar" style="background:var(--avatar-bg' + p.slot_id + ');color:#fff">' + AVATARS[p.slot_id - 1] + '</div>';
    html += '<div class="slot-info">';
    html += '<div class="slot-name">' + escapeHtml(p.display_name) + '</div>';
    html += '<div class="slot-hint">' + hint + '</div>';
    html += '</div>';
    html += '<button class="slot-edit" onclick="event.stopPropagation();openRename(' + p.slot_id + ')">改名</button>';
    html += '</div>';
  });
  document.getElementById('slotList').innerHTML = html;
}

function selectSlot(sid) {
  selectedSlot = sid;
  document.getElementById('btnGo').disabled = false;
  renderSlots();
  // Auto-save if name is already custom
  var p = profiles.find(function(x) { return x.slot_id === sid; });
  if (p && p.display_name.indexOf('学友') !== 0) {
    setSlot(sid, p.display_name);
  }
}

function openRename(sid) {
  editingSlot = sid;
  var p = profiles.find(function(x) { return x.slot_id === sid; });
  document.getElementById('renameInput').value = p ? p.display_name : '';
  document.getElementById('renameModal').classList.add('show');
  setTimeout(function() { document.getElementById('renameInput').focus(); }, 100);
}

function closeRename() {
  document.getElementById('renameModal').classList.remove('show');
  editingSlot = null;
}

async function saveRename() {
  var name = document.getElementById('renameInput').value.trim();
  if (!name) { closeRename(); return; }

  try {
    await updateProfile(editingSlot, name);
    var p = profiles.find(function(x) { return x.slot_id === editingSlot; });
    if (p) p.display_name = name;
    renderSlots();
    // If this slot was selected, update stored name
    if (selectedSlot === editingSlot) {
      setSlot(editingSlot, name);
    }
    closeRename();
  } catch(e) {
    console.error('Rename error:', e);
    // Still update locally
    var p = profiles.find(function(x) { return x.slot_id === editingSlot; });
    if (p) p.display_name = name;
    renderSlots();
    if (selectedSlot === editingSlot) setSlot(editingSlot, name);
    closeRename();
  }
}

async function goLearn() {
  if (!selectedSlot) return;

  var p = profiles.find(function(x) { return x.slot_id === selectedSlot; });
  var name = p ? p.display_name : '学友' + selectedSlot;

  // If still default name, prompt rename
  if (name.indexOf('学友') === 0) {
    openRename(selectedSlot);
    // Wait a bit then redirect after rename
    var checkInterval = setInterval(function() {
      var updated = profiles.find(function(x) { return x.slot_id === selectedSlot; });
      if (updated && updated.display_name.indexOf('学友') !== 0) {
        clearInterval(checkInterval);
        setSlot(selectedSlot, updated.display_name);
        window.location.href = '/index.html';
      }
    }, 500);
    // Timeout after 10s
    setTimeout(function() { clearInterval(checkInterval); setSlot(selectedSlot, name); window.location.href = '/index.html'; }, 10000);
    return;
  }

  setSlot(selectedSlot, name);
  window.location.href = '/index.html';
}

function escapeHtml(str) {
  var div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

init();
</script>
</body>
</html>
